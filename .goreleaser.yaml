version: 2

project_name: git-wt

builds:
  - main: ./cmd/git-wt
    binary: git-wt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: git-wt
    repository:
      owner: sonyabytes
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/sonyabytes/git-wt
    description: "Agent-friendly git worktrees: pre-provisioned via copy-on-write, one naming convention"
    dependencies:
      - name: git
    test: |
      system "#{bin}/git-wt", "--help"

nfpms:
  - package_name: git-wt
    formats: [deb, rpm, apk]
    maintainer: Sonya <sonyatalona@gmail.com>
    homepage: https://github.com/sonyabytes/git-wt
    description: "Agent-friendly git worktrees: pre-provisioned via copy-on-write, one naming convention"
    bindir: /usr/bin
    dependencies:
      - git

changelog:
  use: github-native

release:
  footer: |
    ## Install

    ```sh
    go install github.com/sonyabytes/git-wt/cmd/git-wt@{{ .Tag }}
    ```

    Or download the archive for your platform above and put `git-wt` on your PATH — git then exposes it as `git wt`.
